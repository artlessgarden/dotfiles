<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>my JS Drum Kit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="keyboard">
      <row-one>
        <div data-key="q" class="key">
          <kbd>q</kbd>
        </div>
        <div data-key="w" class="key">
          <kbd>w</kbd>
        </div>
        <div data-key="e" class="key">
          <kbd>e</kbd>
        </div>
        <div data-key="r" class="key">
          <kbd>r</kbd>
        </div>
        <div data-key="t" class="key">
          <kbd>t</kbd>
        </div>
      </row-one>
      <row-two>
        <div data-key="a" class="key">
          <kbd>a</kbd>
        </div>
        <div data-key="s" class="key">
          <kbd>s</kbd>
        </div>
        <div data-key="d" class="key">
          <kbd>d</kbd>
        </div>
        <div data-key="f" class="key">
          <kbd>f</kbd>
        </div>
        <div data-key="g" class="key">
          <kbd>g</kbd>
        </div>
      </row-two>
      <row-three>
        <div data-key="z" class="key">
          <kbd>z</kbd>
        </div>
        <div data-key="x" class="key">
          <kbd>x</kbd>
        </div>
        <div data-key="c" class="key">
          <kbd>c</kbd>
        </div>
        <div data-key="v" class="key">
          <kbd>v</kbd>
        </div>
      </row-three>
    </div>
    <audio data-key="a" src="./ding.mp3"></audio>
    <script src="script.js"></script>
  </body>
</html>
