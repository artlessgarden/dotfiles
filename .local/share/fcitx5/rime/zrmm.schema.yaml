# Rime schema settings
# encoding: utf-8

schema:
  schema_id: zrmm
  name: 魔
  version: "1.0"

engine:
  processors:
    - ascii_composer
    - key_binder
    - recognizer
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - fallback_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: "bcdfghjklmnpqrstvwxyzaeuio"
#  auto_select: 
  max_code_length: 4
  auto_clear: max_length

translator:
  dictionary: zrmm
  enable_sentence: false
  enable_encoder: true
  encode_commit_history: true
  enable_user_dict: true
  user_dict: zrm_zkci
#  enable_completion: true
  max_phrase_length: 5
  initial_quality: 10

# menu:
#  page_size: 10
#  alternative_select_labels: [""]
#  alternative_select_labels: ["","","",""]

key_binder:
  bindings:
#    - { when: has_menu, accept: Tab, send: q }
#    - { when: has_menu, accept: BackSpace, send: p }
#    - { when: has_menu, accept: Escape, send: bracketleft }
#    - { when: has_menu, accept: Return, send: bracketright }
#    - { when: has_menu, accept: -, send: Escape }
#    - { when: has_menu, accept: 6, send: BackSpace }
#    - { when: has_menu, accept: q, send: / }
#    - { when: has_menu, accept: p, send: ; }
    - {accept: semicolon, send: 2, when: has_menu}
    - {accept: /, send: 3, when: has_menu}