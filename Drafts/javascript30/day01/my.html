<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>my JS Drum Kit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="keys">
      <div data-key="a" class="key">
        <kbd>A</kbd>
        <audio data-key="a" src="boom.wav"></audio>
      </div>
    </div>

    <script>
      window.addEventListener("keydown", (e) => {
        console.log(`tap the ${e.key}`);
        const elkey = document.querySelector(`div[data-key="${e.key}"]`);
        const elaudio = document.querySelector(`audio[data-key="${e.key}"]`);
        if (!elkey) console.log("not a difine key");
        else {
          console.log(elkey);
          console.log(elaudio);
          elkey.classList.add("playing");
        }
      });
    </script>
  </body>
</html>
